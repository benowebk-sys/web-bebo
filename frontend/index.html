<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebo Group - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Bebo Group</h1>
            <p>منصة خاصه بالفرقه الرابعه  قسم سكه حديد</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="student">طالب</button>
            <button class="tab-btn" data-tab="admin">أدمن</button>
        </div>

        <!-- Student Login -->
        <form id="student-tab" class="tab-content active" onsubmit="studentLogin(event)">
            <div class="form-group">
                <label>رقم الدخول</label>
                <input type="text" id="student-phone" placeholder="أدخل رقمك الثابت" maxlength="20" required>
            </div>
            <button type="submit" class="btn btn-primary">دخول للمنصة</button>
        </form>

        <!-- Admin Login -->
        <form id="admin-tab" class="tab-content" onsubmit="adminLogin(event)">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="admin-email" placeholder="admin@benogroup.com" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary">دخول الأدمن</button>
        </form>

        <div id="error-msg" class="error-msg"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
